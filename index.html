<script>
function createFlow(container, text, opts) {
  opts = opts || {};
  var fontSize = opts.fontSize || 18;
  var lineHeight = opts.lineHeight || 24;
  var color = opts.color || '#111';
  var padding = (opts.padding != null) ? opts.padding : 16;
  var getObstacles = opts.getObstacles || function () { return []; };
  var fontFamily = '"Times New Roman", Times, serif';

  var cw = container.clientWidth;
  var ch = container.clientHeight;

  // ---- Measure each word ONCE with canvas measureText ----
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  ctx.font = fontSize + 'px ' + fontFamily;
  var spaceW = ctx.measureText(' ').width;

  var rawWords = text.split(/\s+/).filter(function (w) { return w.length > 0; });
  // Precompute immutable word records: text + measured width.
  var words = new Array(rawWords.length);
  for (var i = 0; i < rawWords.length; i++) {
    words[i] = { text: rawWords[i], w: ctx.measureText(rawWords[i]).width };
  }

  // ---- Reusable span pool ----
  // Spans are created lazily and kept; relayout reuses them by index and
  // hides any surplus rather than destroying nodes.
  var pool = [];
  function acquire(idx) {
    var s = pool[idx];
    if (!s) {
      s = document.createElement('span');
      s.style.position = 'absolute';
      s.style.top = '0';
      s.style.left = '0';
      s.style.font = fontSize + 'px ' + fontFamily;
        s.style.whiteSpace = 'pre';
      s.style.willChange = 'transform';
      container.appendChild(s);
      pool[idx] = s;
    }
    return s;
  }

  // ---- Free-interval computation for a horizontal band ----
  // Returns array of [x0,x1] free intervals within [0,cw], obstacles expanded
  // by padding. Reuses a scratch array to avoid per-call allocation churn.
  var blockedScratch = [];
  function freeIntervals(bandTop, bandBot, obstacles) {
    blockedScratch.length = 0;
    for (var k = 0; k < obstacles.length; k++) {
      var o = obstacles[k];
      var bx0, bx1;
      if (o.type === 'rect') {
        var oy0 = o.y - padding, oy1 = o.y + o.h + padding;
        if (bandBot <= oy0 || bandTop >= oy1) continue; // band doesn't cross
        bx0 = o.x - padding;
        bx1 = o.x + o.w + padding;
      } else { // circle
        var R = o.r + padding;
        // Use the y within the band closest to the circle center, so the
        // blocked interval is the WIDEST chord the band's full height sees
        // (a word box spans the whole band, not just its mid-y).
        var nearY = o.cy;
        if (nearY < bandTop) nearY = bandTop;
        else if (nearY > bandBot) nearY = bandBot;
        var dy = nearY - o.cy;
        if (dy < 0) dy = -dy;
        if (dy >= R) continue; // band doesn't reach the expanded circle
        var half = Math.sqrt(R * R - dy * dy);
        bx0 = o.cx - half;
        bx1 = o.cx + half;
      }
      if (bx1 <= 0 || bx0 >= cw) continue;
      if (bx0 < 0) bx0 = 0;
      if (bx1 > cw) bx1 = cw;
      blockedScratch.push([bx0, bx1]);
    }
    if (blockedScratch.length === 0) return [[0, cw]];
    blockedScratch.sort(function (a, b) { return a[0] - b[0]; });
    // merge overlapping blocked intervals
    var merged = [];
    var cur = blockedScratch[0].slice();
    for (var m = 1; m < blockedScratch.length; m++) {
      var iv = blockedScratch[m];
      if (iv[0] <= cur[1]) { if (iv[1] > cur[1]) cur[1] = iv[1]; }
      else { merged.push(cur); cur = iv.slice(); }
    }
    merged.push(cur);
    // complement -> free intervals
    var free = [];
    var x = 0;
    for (var f = 0; f < merged.length; f++) {
      if (merged[f][0] > x) free.push([x, merged[f][0]]);
      x = merged[f][1];
    }
    if (x < cw) free.push([x, cw]);
    return free;
  }

  function relayout() {
    var obstacles = getObstacles() || [];
    var spanIdx = 0;        // index into pool / placed-word cursor
    var wi = 0;             // next word to place

    for (var y = 0; y + lineHeight <= ch && wi < words.length; y += lineHeight) {
      var bandTop = y;
      var bandBot = y + lineHeight;
      var free = freeIntervals(bandTop, bandBot, obstacles);

      var baselineTop = y + (lineHeight - fontSize) / 2; // vertical centering in band

      // Fill each free interval left-to-right with the pending words.
      for (var s = 0; s < free.length && wi < words.length; s++) {
        var segX1 = free[s][1];
        var penX = free[s][0];
        var first = true;
        while (wi < words.length) {
          var word = words[wi];
          var need = (first ? 0 : spaceW) + word.w;
          if (penX + need > segX1) break; // word won't fit -> try next free segment
          if (!first) penX += spaceW;
          var span = acquire(spanIdx++);
          span.textContent = word.text;
          span.style.display = 'block';
          span.style.transform = 'translate(' + penX + 'px,' + baselineTop + 'px)';
          penX += word.w;
          wi++;
          first = false;
        }
      }
    }

    // Hide surplus spans from a previous (longer) layout.
    for (var h = spanIdx; h < pool.length; h++) {
      if (pool[h] && pool[h].style.display !== 'none') pool[h].style.display = 'none';
    }
  }

  relayout();
  return { relayout: relayout };
}

 const STRIPS={"diver": [[0.3443, 0.368, 0.0, 0.0455], [0.3005, 0.3644, 0.0455, 0.0909], [0.2868, 0.3178, 0.0909, 0.1364], null, [0.2685, 0.3132, 0.1818, 0.2273], [0.1534, 0.3114, 0.2273, 0.2727], [0.1014, 0.2639, 0.2727, 0.3182], [0.0849, 0.3352, 0.3182, 0.3636], [0.0822, 0.4502, 0.3636, 0.4091], [0.0858, 0.5151, 0.4091, 0.4545], [0.0858, 0.579, 0.4545, 0.5], [0.0932, 0.5936, 0.5, 0.5455], [0.1068, 0.8712, 0.5455, 0.5909], [0.1096, 0.9306, 0.5909, 0.6364], [0.0995, 0.9881, 0.6364, 0.6818], [0.0137, 0.9881, 0.6818, 0.7273], [0.011, 0.9726, 0.7273, 0.7727], [0.4977, 0.9543, 0.7727, 0.8182], [0.5671, 0.9406, 0.8182, 0.8636], [0.642, 0.9626, 0.8636, 0.9091], [0.8566, 0.9571, 0.9091, 0.9545], [0.8822, 0.9279, 0.9545, 1.0]]}, STORY=`hi, i'm vihaan, and this is a small book about the things i've made. i tend to build something, break it on purpose, and then rebuild it until it holds, so most of these pages are really just that one loop told a few different ways. right now almost all of my time goes into presonance. it's a small comp-neuro lab, and what we're after is predicting how people actually respond to a piece of content before anyone spends a single dollar promoting it. not what they say in a survey, not what a language model guesses, but how a real nervous system reacts. i'm the co-founder and ceo. we're advised by people who have already done the hard version of this: ad teams at meta, neuroscience folks at georgia tech, and a couple of founders who have each built nine-figure companies and are kind enough to keep me honest when i get ahead of myself. this fall i start computer science at carnegie mellon. i'm coming in with a 4.0, and i'm already on the teams behind scottylabs foundry and ueax, because sitting still has never really worked for me. right before this i spent about nine months as a machine learning researcher at the institute for systems biology, working on diagnostic and prognostic models for preeclampsia, a quiet and dangerous condition in pregnancy, with the whole point being to catch it earlier than we currently can. getting to point a model at something that actually matters to a person's life changed how i think about all of this. a few other things happened along the way. i won most innovative at harvard's health systems innovation lab for medsim, a world-models agent system built for trauma centers. i made sentinent, a swarm-intelligence trading engine that turns live sentiment into positions i can actually explain instead of just trusting. for a while i was a funded trader at topstep, running indicators i had coded myself, until i admitted you cannot half-build a company and quit to put everything into presonance. somewhere in there i ran expansion at ai valley alongside teams from openai, anthropic, and afore. go back a little further and i was sixteen, founding oncoscan.ai. i built and patented an oral cancer detection model, found national partnerships willing to take a teenager seriously, and got the company onto aws activate. around the same time i started the uplift network, where i wrote a computer science program, got it in front of more than three thousand students across over fifty schools, and we helped cover college tuition for some of the kids who finished it. that one mattered to me in a different way than the rest. but if you want the real beginning, it is smaller and quieter than any of that. i started coding in sixth grade, mostly because it felt like a kind of magic that you could write something down and watch it learn. i built my first neural network at thirteen. my first real research win was a 3d convolutional network that classified brain strokes from scans, and it took first place at the washington state science and engineering fair. everything on these pages grew out of that one stubborn curiosity. the through-line never really changed. i like hard problems that touch real people, i like building the thing instead of talking about the thing, and i am completely fine being wrong on the way to being right. when i'm not at a screen you'll usually find me scuba diving or skydiving, which, if i'm honest, is the same loop as everything else in this book, just with more water and more air. thanks for turning the pages.`;
 const fl=document.getElementById('fl'), fr=document.getElementById('fr');
 const pics=[...document.querySelectorAll('.pic')];
 let mx=-999,my=-999,spread=0,PAGES=[],leftApi=null,rightApi=null;

 function paginate(){
   const box=fl.getBoundingClientRect(); const W=box.width,H=box.height;
   const fs=18,lh=29,slack=2;
   const ctx=document.createElement('canvas').getContext('2d'); ctx.font=fs+'px "Times New Roman",serif';
   const sw=ctx.measureText(' ').width; const words=STORY.split(/\s+/).filter(Boolean);
   const linesPerPage=Math.max(3,Math.floor(H/lh)-slack);
   PAGES=[]; let i=0;
   while(i<words.length){ let lines=0,start=i;
     while(lines<linesPerPage && i<words.length){ let x=0,placed=false;
       while(i<words.length){ const ww=ctx.measureText(words[i]).width; const need=(x===0?0:sw)+ww; if(x+need<=W){x+=need;i++;placed=true;}else break; }
       if(!placed)i++; lines++; }
     PAGES.push(words.slice(start,i).join(' ')); }
   return {fs,lh};
 }
 function obstaclesFor(el){
   const pr=el.getBoundingClientRect(); const obs=[];
   for(const pic of pics){ if(getComputedStyle(pic).display==='none')continue;
     const r=pic.getBoundingClientRect();
     if(r.right<pr.left||r.left>pr.right||r.bottom<pr.top||r.top>pr.bottom)continue;
     const k=pic.dataset.strips;
     if(k&&STRIPS[k]){ for(const s of STRIPS[k]){ if(!s)continue;
       obs.push({type:'rect',x:r.left-pr.left+s[0]*r.width,y:r.top-pr.top+s[2]*r.height,w:(s[1]-s[0])*r.width,h:(s[3]-s[2])*r.height}); } }
     else obs.push({type:'rect',x:r.left-pr.left,y:r.top-pr.top,w:r.width,h:r.height});
   }
   if(mx>-900)obs.push({type:'circle',cx:mx-pr.left,cy:my-pr.top,r:40});
   return obs;
 }
 let cfg={fs:18,lh:29};
 function buildSpread(){
   const li=spread*2,ri=spread*2+1;
   fl.innerHTML='';fr.innerHTML='';
   leftApi = PAGES[li]!=null ? createFlow(fl,PAGES[li],{fontSize:cfg.fs,lineHeight:cfg.lh,padding:13,getObstacles:()=>obstaclesFor(fl)}):null;
   rightApi= PAGES[ri]!=null ? createFlow(fr,PAGES[ri],{fontSize:cfg.fs,lineHeight:cfg.lh,padding:13,getObstacles:()=>obstaclesFor(fr)}):null;
   document.getElementById('pl').textContent=PAGES[li]!=null?(li+1):'';
   document.getElementById('pr').textContent=PAGES[ri]!=null?(ri+1):'';
   const ms=Math.ceil(PAGES.length/2)-1;
   document.getElementById('counter').textContent=(spread+1)+' / '+(ms+1);
   document.getElementById('prev').disabled=spread<=0; document.getElementById('next').disabled=spread>=ms;
   relayout();
 }
 let q=false; function relayout(){ if(q)return;q=true;requestAnimationFrame(()=>{q=false;leftApi&&leftApi.relayout();rightApi&&rightApi.relayout();}); }

 // page-turn flip
 const flip=document.getElementById('flip');
 function turn(dir,after){
   const fwd=dir>0;
   flip.style.display='block';
   flip.style.left=fwd?'50%':'0';
   flip.style.transformOrigin=fwd?'left center':'right center';
   flip.style.transition='none'; flip.style.transform='rotateY(0deg)';
   requestAnimationFrame(()=>{ flip.style.transition='transform .6s ease';
     flip.style.transform='rotateY('+(fwd?-160:160)+'deg)'; });
   setTimeout(after,300);
   setTimeout(()=>{ flip.style.display='none'; },640);
 }

 let drag=null,ox=0,oy=0;
 for(const pic of pics) pic.addEventListener('pointerdown',e=>{drag=pic;const r=pic.getBoundingClientRect();ox=e.clientX-r.left;oy=e.clientY-r.top;document.body.classList.add('grabbing');pic.setPointerCapture(e.pointerId);e.preventDefault();});
 addEventListener('pointermove',e=>{mx=e.clientX;my=e.clientY;if(drag){drag.style.left=(e.clientX-ox)+'px';drag.style.top=(e.clientY-oy)+'px';drag.style.right='auto';}relayout();});
 addEventListener('pointerup',()=>{drag=null;document.body.classList.remove('grabbing');});

 function go(d){ const ms=Math.ceil(PAGES.length/2)-1; if((d>0&&spread<ms)||(d<0&&spread>0)){ turn(d,()=>{spread+=d;buildSpread();}); } }
 document.getElementById('next').onclick=()=>go(1);
 document.getElementById('prev').onclick=()=>go(-1);
 addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
 addEventListener('resize',()=>{cfg=paginate();spread=Math.min(spread,Math.ceil(PAGES.length/2)-1);buildSpread();});

 function open(){
   if(document.body.classList.contains('opened'))return;
   document.body.classList.add('opened');
   const bk=document.querySelector('.book').getBoundingClientRect();
   const d=document.getElementById('diver'),s=document.getElementById('shot');
   d.style.left=(bk.left+bk.width*0.62)+'px';d.style.top=(bk.top+bk.height*0.32)+'px';
   s.style.left=(bk.left+bk.width*0.08)+'px';s.style.top=(bk.top+bk.height*0.58)+'px';
 }
 document.getElementById('coverBook').addEventListener('click',open);

 function init(){ cfg=paginate(); buildSpread(); }
 if(document.readyState==='complete')init(); else addEventListener('load',init);
</script></body></html>
