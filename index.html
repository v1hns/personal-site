<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vihaan Shringi</title>
<link rel="icon" type="image/webp" href="favicon.webp" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { font-family:"Times New Roman",Times,serif; background:#1c2530;
    background:radial-gradient(ellipse at 50% 30%, #2a3744, #141a21 70%);
    display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .book { position:relative; width:min(1100px,94vw); height:min(700px,86vh); display:flex;
    border-radius:6px; box-shadow:0 40px 90px -20px rgba(0,0,0,.7); }
  .page { position:relative; flex:1; background:#f3ead6; overflow:hidden; }
  .page.left  { border-radius:6px 0 0 6px; background:linear-gradient(90deg,#efe5cf,#f5ecd9 22%); }
  .page.right { border-radius:0 6px 6px 0; background:linear-gradient(270deg,#efe5cf,#f5ecd9 22%); }
  .spine { position:absolute; top:0; bottom:0; left:50%; width:34px; transform:translateX(-50%); z-index:5; pointer-events:none;
    background:linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(60,40,20,.18) 42%, rgba(80,55,30,.30) 50%, rgba(60,40,20,.18) 58%, rgba(0,0,0,0) 100%); }
  .flow { position:absolute; inset:46px 52px; color:#2a2018; }
  .flow span { position:absolute; will-change:transform; }
  .pageno { position:absolute; bottom:18px; width:100%; text-align:center; font-size:12px; color:#9a8a66; font-style:italic; }
  .nav { position:fixed; bottom:22px; left:50%; transform:translateX(-50%); z-index:20; display:flex; gap:18px; align-items:center;
    font-size:13px; color:#cdd6df; }
  .nav button { font-family:inherit; background:rgba(255,255,255,.06); color:#e7edf2; border:1px solid rgba(255,255,255,.18);
    border-radius:99px; padding:7px 16px; cursor:pointer; font-size:13px; transition:background .2s; }
  .nav button:hover { background:rgba(255,255,255,.14); }
  .nav button:disabled { opacity:.3; cursor:default; }
  /* draggable pics float above the book */
  .pic { position:fixed; z-index:15; user-select:none; -webkit-user-drag:none; touch-action:none;
    cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2230%22%20height%3D%2230%22%20viewBox%3D%220%200%2030%2030%22%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22%23fff%22%20stroke-width%3D%223.4%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%2215%22%20cy%3D%2215%22%20r%3D%225.2%22/%3E%3Cpath%20d%3D%22M15%203.6v3.4M15%2023v3.4M3.6%2015h3.4M23%2015h3.4%22/%3E%3Cpath%20d%3D%22M15%202.5l-2.2%202.4M15%202.5l2.2%202.4M15%2027.5l-2.2-2.4M15%2027.5l2.2-2.4M2.5%2015l2.4-2.2M2.5%2015l2.4%202.2M27.5%2015l-2.4-2.2M27.5%2015l-2.4%202.2%22/%3E%3C/g%3E%3Cg%20fill%3D%22none%22%20stroke%3D%22%231c1c22%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Ccircle%20cx%3D%2215%22%20cy%3D%2215%22%20r%3D%225.2%22/%3E%3Cpath%20d%3D%22M15%203.6v3.4M15%2023v3.4M3.6%2015h3.4M23%2015h3.4%22/%3E%3Cpath%20d%3D%22M15%202.5l-2.2%202.4M15%202.5l2.2%202.4M15%2027.5l-2.2-2.4M15%2027.5l2.2-2.4M2.5%2015l2.4-2.2M2.5%2015l2.4%202.2M27.5%2015l-2.4-2.2M27.5%2015l-2.4%202.2%22/%3E%3C/g%3E%3C/svg%3E") 15 15, grab; filter:drop-shadow(0 12px 26px rgba(0,0,0,.45)); will-change:left,top; }
  body.grabbing, body.grabbing .pic, body.grabbing * { cursor:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%2230%22%20height%3D%2230%22%20viewBox%3D%220%200%2030%2030%22%3E%3Ccircle%20cx%3D%2215%22%20cy%3D%2215%22%20r%3D%226.6%22%20fill%3D%22%231c1c22%22%20stroke%3D%22%23fff%22%20stroke-width%3D%222.4%22/%3E%3C/svg%3E") 15 15, grabbing !important; }
  #diver { width:230px; }
  #shot  { width:200px; border-radius:7px; border:3px solid #fff; }
  .hint { position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:20; color:#aeb9c4; font-size:12px; font-style:italic; letter-spacing:.3px; }
</style>
</head>
<body>
  <div class="hint">drag the pictures — the words flow around them</div>
  <div class="book">
    <div class="page left"><div class="flow" id="fl"></div><div class="pageno" id="pl"></div></div>
    <div class="spine"></div>
    <div class="page right"><div class="flow" id="fr"></div><div class="pageno" id="pr"></div></div>
  </div>
  <div class="nav">
    <button id="prev">← prev</button>
    <span id="counter"></span>
    <button id="next">next →</button>
  </div>

  <img class="pic" id="diver" src="media/diver.png" alt="" data-strips="diver" />
  <img class="pic" id="shot"  src="media/screens/presonance-product.png" alt="" />

  <script>
function createFlow(container, text, opts) {
  opts = opts || {};
  var fontSize = opts.fontSize || 18;
  var lineHeight = opts.lineHeight || 24;
  var color = opts.color || '#111';
  var padding = (opts.padding != null) ? opts.padding : 16;
  var getObstacles = opts.getObstacles || function () { return []; };
  var fontFamily = '"Times New Roman", Times, serif';

  var cw = container.clientWidth;
  var ch = container.clientHeight;

  // ---- Measure each word ONCE with canvas measureText ----
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  ctx.font = fontSize + 'px ' + fontFamily;
  var spaceW = ctx.measureText(' ').width;

  var rawWords = text.split(/\s+/).filter(function (w) { return w.length > 0; });
  // Precompute immutable word records: text + measured width.
  var words = new Array(rawWords.length);
  for (var i = 0; i < rawWords.length; i++) {
    words[i] = { text: rawWords[i], w: ctx.measureText(rawWords[i]).width };
  }

  // ---- Reusable span pool ----
  // Spans are created lazily and kept; relayout reuses them by index and
  // hides any surplus rather than destroying nodes.
  var pool = [];
  function acquire(idx) {
    var s = pool[idx];
    if (!s) {
      s = document.createElement('span');
      s.style.position = 'absolute';
      s.style.top = '0';
      s.style.left = '0';
      s.style.font = fontSize + 'px ' + fontFamily;
        s.style.whiteSpace = 'pre';
      s.style.willChange = 'transform';
      container.appendChild(s);
      pool[idx] = s;
    }
    return s;
  }

  // ---- Free-interval computation for a horizontal band ----
  // Returns array of [x0,x1] free intervals within [0,cw], obstacles expanded
  // by padding. Reuses a scratch array to avoid per-call allocation churn.
  var blockedScratch = [];
  function freeIntervals(bandTop, bandBot, obstacles) {
    blockedScratch.length = 0;
    for (var k = 0; k < obstacles.length; k++) {
      var o = obstacles[k];
      var bx0, bx1;
      if (o.type === 'rect') {
        var oy0 = o.y - padding, oy1 = o.y + o.h + padding;
        if (bandBot <= oy0 || bandTop >= oy1) continue; // band doesn't cross
        bx0 = o.x - padding;
        bx1 = o.x + o.w + padding;
      } else { // circle
        var R = o.r + padding;
        // Use the y within the band closest to the circle center, so the
        // blocked interval is the WIDEST chord the band's full height sees
        // (a word box spans the whole band, not just its mid-y).
        var nearY = o.cy;
        if (nearY < bandTop) nearY = bandTop;
        else if (nearY > bandBot) nearY = bandBot;
        var dy = nearY - o.cy;
        if (dy < 0) dy = -dy;
        if (dy >= R) continue; // band doesn't reach the expanded circle
        var half = Math.sqrt(R * R - dy * dy);
        bx0 = o.cx - half;
        bx1 = o.cx + half;
      }
      if (bx1 <= 0 || bx0 >= cw) continue;
      if (bx0 < 0) bx0 = 0;
      if (bx1 > cw) bx1 = cw;
      blockedScratch.push([bx0, bx1]);
    }
    if (blockedScratch.length === 0) return [[0, cw]];
    blockedScratch.sort(function (a, b) { return a[0] - b[0]; });
    // merge overlapping blocked intervals
    var merged = [];
    var cur = blockedScratch[0].slice();
    for (var m = 1; m < blockedScratch.length; m++) {
      var iv = blockedScratch[m];
      if (iv[0] <= cur[1]) { if (iv[1] > cur[1]) cur[1] = iv[1]; }
      else { merged.push(cur); cur = iv.slice(); }
    }
    merged.push(cur);
    // complement -> free intervals
    var free = [];
    var x = 0;
    for (var f = 0; f < merged.length; f++) {
      if (merged[f][0] > x) free.push([x, merged[f][0]]);
      x = merged[f][1];
    }
    if (x < cw) free.push([x, cw]);
    return free;
  }

  function relayout() {
    var obstacles = getObstacles() || [];
    var spanIdx = 0;        // index into pool / placed-word cursor
    var wi = 0;             // next word to place

    for (var y = 0; y + lineHeight <= ch && wi < words.length; y += lineHeight) {
      var bandTop = y;
      var bandBot = y + lineHeight;
      var free = freeIntervals(bandTop, bandBot, obstacles);

      var baselineTop = y + (lineHeight - fontSize) / 2; // vertical centering in band

      // Fill each free interval left-to-right with the pending words.
      for (var s = 0; s < free.length && wi < words.length; s++) {
        var segX1 = free[s][1];
        var penX = free[s][0];
        var first = true;
        while (wi < words.length) {
          var word = words[wi];
          var need = (first ? 0 : spaceW) + word.w;
          if (penX + need > segX1) break; // word won't fit -> try next free segment
          if (!first) penX += spaceW;
          var span = acquire(spanIdx++);
          span.textContent = word.text;
          span.style.display = 'block';
          span.style.transform = 'translate(' + penX + 'px,' + baselineTop + 'px)';
          penX += word.w;
          wi++;
          first = false;
        }
      }
    }

    // Hide surplus spans from a previous (longer) layout.
    for (var h = spanIdx; h < pool.length; h++) {
      if (pool[h] && pool[h].style.display !== 'none') pool[h].style.display = 'none';
    }
  }

  relayout();
  return { relayout: relayout };
}

  const STRIPS = {"diver": [[0.3443, 0.368, 0.0, 0.0455], [0.3005, 0.3644, 0.0455, 0.0909], [0.2868, 0.3178, 0.0909, 0.1364], null, [0.2685, 0.3132, 0.1818, 0.2273], [0.1534, 0.3114, 0.2273, 0.2727], [0.1014, 0.2639, 0.2727, 0.3182], [0.0849, 0.3352, 0.3182, 0.3636], [0.0822, 0.4502, 0.3636, 0.4091], [0.0858, 0.5151, 0.4091, 0.4545], [0.0858, 0.579, 0.4545, 0.5], [0.0932, 0.5936, 0.5, 0.5455], [0.1068, 0.8712, 0.5455, 0.5909], [0.1096, 0.9306, 0.5909, 0.6364], [0.0995, 0.9881, 0.6364, 0.6818], [0.0137, 0.9881, 0.6818, 0.7273], [0.011, 0.9726, 0.7273, 0.7727], [0.4977, 0.9543, 0.7727, 0.8182], [0.5671, 0.9406, 0.8182, 0.8636], [0.642, 0.9626, 0.8636, 0.9091], [0.8566, 0.9571, 0.9091, 0.9545], [0.8822, 0.9279, 0.9545, 1.0]]};
  const PAGES = [{"size": 31, "lh": 44, "text": "vihaan shringi. a small book of what i've built, broken, and shipped. drag the pictures anywhere on the page, the words move out of their way. turn the page when you're ready."}, {"size": 19, "lh": 30, "text": "right now i'm building presonance, a small comp-neuro lab that predicts how people actually respond to ads before anyone spends a dollar on them. i'm the co-founder and ceo, advised by ad teams at meta, neuroscience folks at georgia tech, and a couple of 100m+ founders who keep me honest. the whole bet is simple: a real nervous system reacts a certain way, and i think you can model it."}, {"size": 19, "lh": 30, "text": "this fall i start computer science at carnegie mellon, coming in with a 4.0, already on the teams behind scottylabs foundry and ueax. before that i spent about nine months as a machine learning researcher at the institute for systems biology, building diagnostic and prognostic models for preeclampsia, trying to catch something dangerous earlier than we currently can."}, {"size": 19, "lh": 30, "text": "i won most innovative at harvard's hsil for medsim, a world-models agent system for trauma centers. i built sentinent, a swarm-intelligence trading engine that turns live sentiment into calls i can actually explain. i was a funded trader at topstep running ai indicators i coded myself, and then i quit to go all in on presonance, because you can't half-build a company."}, {"size": 19, "lh": 30, "text": "earlier, at sixteen, i founded oncoscan.ai. i built and patented an oral cancer detection model, landed national partnerships, and got onto aws activate. around the same time i started the uplift network, wrote a cs program, got it in front of three thousand students across more than fifty schools, and helped cover college tuition for some of them."}, {"size": 19, "lh": 30, "text": "the origin is simpler. i started coding in sixth grade and built my first neural net at thirteen. my first real research win was a 3d cnn that classified brain strokes and took first at the washington state science fair. the through-line never changed: i build things, i break them, and i retrain until they hold. off the clock you'll find me scuba diving or skydiving, same loop, more water and more air."}];
  const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
  let mx=-999,my=-999, spread=0; // spread index (each = 2 pages)
  const fl=document.getElementById('fl'), fr=document.getElementById('fr');
  const pics=[...document.querySelectorAll('.pic')];
  let leftApi=null, rightApi=null;

  function obstaclesFor(flowEl){
    const pr=flowEl.getBoundingClientRect(); const obs=[];
    for(const pic of pics){
      if(pic.style.display==='none') continue;
      const r=pic.getBoundingClientRect();
      if(r.right<pr.left||r.left>pr.right||r.bottom<pr.top||r.top>pr.bottom) continue;
      const key=pic.dataset.strips;
      if(key && STRIPS[key]){
        for(const s of STRIPS[key]){ if(!s)continue;
          obs.push({type:'rect', x:r.left-pr.left+s[0]*r.width, y:r.top-pr.top+s[2]*r.height,
                    w:(s[1]-s[0])*r.width, h:(s[3]-s[2])*r.height}); }
      } else {
        obs.push({type:'rect', x:r.left-pr.left, y:r.top-pr.top, w:r.width, h:r.height});
      }
    }
    if(mx>-900) obs.push({type:'circle', cx:mx-pr.left, cy:my-pr.top, r:40});
    return obs;
  }

  function buildSpread(){
    const li=spread*2, ri=spread*2+1;
    fl.innerHTML=''; fr.innerHTML='';
    leftApi = PAGES[li] ? createFlow(fl, PAGES[li].text, {fontSize:PAGES[li].size, lineHeight:PAGES[li].lh, padding:13, getObstacles:()=>obstaclesFor(fl)}) : null;
    rightApi = PAGES[ri] ? createFlow(fr, PAGES[ri].text, {fontSize:PAGES[ri].size, lineHeight:PAGES[ri].lh, padding:13, getObstacles:()=>obstaclesFor(fr)}) : null;
    document.getElementById('pl').textContent = PAGES[li]? (li+1):'';
    document.getElementById('pr').textContent = PAGES[ri]? (ri+1):'';
    const maxSpread=Math.ceil(PAGES.length/2)-1;
    document.getElementById('counter').textContent=(spread+1)+' / '+(maxSpread+1);
    document.getElementById('prev').disabled = spread<=0;
    document.getElementById('next').disabled = spread>=maxSpread;
    relayout();
  }
  let queued=false;
  function relayout(){ if(queued)return; queued=true; requestAnimationFrame(()=>{ queued=false; leftApi&&leftApi.relayout(); rightApi&&rightApi.relayout(); }); }

  // drag
  let drag=null, ox=0, oy=0;
  for(const pic of pics){
    pic.addEventListener('pointerdown', e=>{ drag=pic; const r=pic.getBoundingClientRect(); ox=e.clientX-r.left; oy=e.clientY-r.top;
      document.body.classList.add('grabbing'); pic.setPointerCapture(e.pointerId); pic.style.zIndex=16; e.preventDefault(); });
  }
  addEventListener('pointermove', e=>{ mx=e.clientX; my=e.clientY;
    if(drag){ drag.style.left=(e.clientX-ox)+'px'; drag.style.top=(e.clientY-oy)+'px'; drag.style.right='auto'; }
    relayout();
  });
  addEventListener('pointerup', ()=>{ drag=null; document.body.classList.remove('grabbing'); });

  document.getElementById('prev').onclick=()=>{ if(spread>0){spread--; buildSpread();} };
  document.getElementById('next').onclick=()=>{ if(spread<Math.ceil(PAGES.length/2)-1){spread++; buildSpread();} };
  addEventListener('keydown', e=>{ if(e.key==='ArrowRight')document.getElementById('next').click(); if(e.key==='ArrowLeft')document.getElementById('prev').click(); });
  addEventListener('resize', ()=>buildSpread());

  function start(){
    // initial positions: diver over right page, screenshot tucked on left
    const bk=document.querySelector('.book').getBoundingClientRect();
    const d=document.getElementById('diver'), s=document.getElementById('shot');
    d.style.left=(bk.left+bk.width*0.60)+'px'; d.style.top=(bk.top+bk.height*0.30)+'px';
    s.style.left=(bk.left+bk.width*0.10)+'px'; s.style.top=(bk.top+bk.height*0.55)+'px';
    buildSpread();
  }
  if(document.readyState==='complete') start(); else addEventListener('load', start);
  </script>
</body>
