<!DOCTYPE html><html lang="en"><head>  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />  <script>try{var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>  <title>Vihaan Shringi</title>  <link rel="preconnect" href="https://fonts.googleapis.com" />  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />  <style>    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }    :root {      --bg: #080808; --surface: #0f0f0f; --surface2: #161616;      --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);      --text: #ebebeb; --muted: #555; --accent: #38bdf8;    }    /* LIGHT MODE */    [data-theme="light"] {      --bg: #fff5f7; --surface: #fff0f4; --surface2: #fde8ee;      --border: rgba(210,99,138,0.1); --border2: rgba(210,99,138,0.22);      --text: #1a0812; --muted: #9a6070; --accent: #d4638a;    }    [data-theme="light"] body::before { background-image: radial-gradient(rgba(212,99,138,0.06) 1px, transparent 1px); }    [data-theme="light"] nav::after { background: linear-gradient(to bottom, rgba(255,245,247,0.97) 65%, transparent); }    [data-theme="light"] .modal-panel { background: #fff5f7; border-color: rgba(0,0,0,0.1); }    [data-theme="light"] .modal-stack-item { background: rgba(0,0,0,0.03); border-color: rgba(0,0,0,0.08); }    [data-theme="light"] .modal-award { border-color: rgba(212,99,138,0.2); background: rgba(212,99,138,0.05); }    [data-theme="light"] .bento-card { background: #fff; }    [data-theme="light"] .hcard { background: #fff; }    [data-theme="light"] .proj { background: #fff; }    [data-theme="light"] .sidebar-card { background: #fff; }    [data-theme="light"] .tl-dot { background: var(--bg); }    [data-theme="light"] .tl-item:hover { background: rgba(0,0,0,0.015); }    [data-theme="light"] .noise { opacity: 0.025; }    [data-theme="light"] .hero-aurora {      background: radial-gradient(ellipse 80% 60% at 78% 38%, rgba(212,99,138,0.07) 0%, transparent 55%),        radial-gradient(ellipse 55% 45% at 90% 8%, rgba(99,102,241,0.05) 0%, transparent 50%),        radial-gradient(ellipse 45% 55% at 65% 85%, rgba(212,99,138,0.04) 0%, transparent 50%);    }    [data-theme="light"] .hero-gridlines {      background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);    }    [data-theme="light"] .orb1 { background: radial-gradient(circle, rgba(212,99,138,0.08) 0%, transparent 70%); }    [data-theme="light"] .orb2 { background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); }    [data-theme="light"] .orb3 { background: radial-gradient(circle, rgba(212,99,138,0.05) 0%, transparent 70%); }    [data-theme="light"] #cursor-ring { border-color: rgba(212,99,138,0.35); }    [data-theme="light"] body.hovered #cursor-ring { border-color: rgba(212,99,138,0.6); }    [data-theme="light"] #spotlight { background: radial-gradient(circle, rgba(212,99,138,0.04) 0%, transparent 70%); }    [data-theme="light"] .contact-glow { background: radial-gradient(ellipse, rgba(212,99,138,0.06) 0%, transparent 70%); }    [data-theme="light"] .hv-card { background: rgba(255,255,255,0.95); border-color: rgba(0,0,0,0.12); }    [data-theme="light"] .event-card { background: #fff; }    [data-theme="light"] .event-card.upcoming { background: rgba(212,99,138,0.03); }    [data-theme="light"] .logo-pill { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }    [data-theme="light"] .logo-pill:hover { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.15); }    [data-theme="light"] .logo-pill span { color: #555; }    [data-theme="light"] .chip { background: rgba(0,0,0,0.04); border-color: rgba(0,0,0,0.08); }    [data-theme="light"] .award { background: #fff; }    [data-theme="light"] .award.featured { background: var(--accent); }    [data-theme="light"] .bento-card.bc-accent { background: rgba(212,99,138,0.05); border-color: rgba(212,99,138,0.2); }

    html { scroll-behavior: smooth; }    * { cursor: none !important; }    @media(max-width:820px){ * { cursor: auto !important; } }    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; }    /* NOISE GRAIN */    .noise { position: fixed; inset: 0; z-index: 200; pointer-events: none; opacity: 0.04;      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");      background-size: 200px 200px; }    /* DOT GRID */    body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.022) 1px, transparent 1px); background-size: 36px 36px; pointer-events: none; z-index: 0; }    /* SCROLL PROGRESS */    #progress { position: fixed; top: 0; left: 0; height: 2px; background: var(--accent); z-index: 999; width: 0%; transition: width 0.05s linear; box-shadow: 0 0 8px rgba(56,189,248,0.6); /* dark */  }    /* CURSOR */    #cursor { position: fixed; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); mix-blend-mode: difference; transition: width .15s, height .15s; }    #cursor-ring { position: fixed; width: 36px; height: 36px; border: 1.5px solid rgba(56,189,248,0.3); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: width .22s, height .22s, border-color .22s; }    body.hovered #cursor { width: 5px; height: 5px; }    body.hovered #cursor-ring { width: 52px; height: 52px; border-color: rgba(56,189,248,0.55); }    body.clicking #cursor { width: 12px; height: 12px; }    /* CURSOR PARTICLE TRAIL */    .cp { position:fixed;width:4px;height:4px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9996;transform:translate(-50%,-50%);animation:cpFade .7s ease forwards; }    @keyframes cpFade { 0%{opacity:.5;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-220%) scale(.1)} }    /* CLICK RIPPLE */    .ripple { position:fixed;border:1.5px solid var(--accent);border-radius:50%;pointer-events:none;z-index:9995;transform:translate(-50%,-50%);animation:rOut .7s ease forwards; }    @keyframes rOut { 0%{width:6px;height:6px;opacity:.7} 100%{width:90px;height:90px;opacity:0} }    /* SPOTLIGHT */    #spotlight { position:fixed; width:500px; height:500px; border-radius:50%; background:radial-gradient(circle, rgba(56,189,248,0.035) 0%, transparent 70%); pointer-events:none; z-index:1; transform:translate(-50%,-50%); transition:left .8s ease,top .8s ease; }    h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; }    /* NAV */    nav { position: fixed; top: 0; width: 100%; z-index: 100; padding: 22px 48px; display: flex; align-items: center; justify-content: space-between; }    nav::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(8,8,8,0.96) 65%, transparent); pointer-events: none; }    .nav-logo { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; color: var(--text); text-decoration: none; position: relative; z-index: 1; }    .nav-logo span { color: var(--accent); }    .nav-links { display: flex; gap: 36px; position: relative; z-index: 1; }    .nav-links a { color: var(--muted); text-decoration: none; font-size: 13px; transition: color .2s; }    .nav-links a:hover { color: var(--text); }    .theme-toggle { background:transparent; border:1px solid var(--border); border-radius:99px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:none; transition:border-color .2s, background .2s; color:var(--muted); padding:0; flex-shrink:0; }    .theme-toggle:hover { border-color:var(--border2); color:var(--text); }    /* HERO */    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 130px 6% 90px; position: relative; overflow: hidden; }    .hero-orb { position: absolute; border-radius: 50%; pointer-events: none; filter: blur(80px); }    .orb1 { width: 600px; height: 600px; top: -180px; right: -150px; background: radial-gradient(circle, rgba(56,189,248,0.07) 0%, transparent 70%); }    .orb2 { width: 400px; height: 400px; bottom: -80px; left: -100px; background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); }    .orb3 { width: 200px; height: 200px; top: 40%; left: 55%; background: radial-gradient(circle, rgba(56,189,248,0.04) 0%, transparent 70%); animation: orbFloat 8s ease-in-out infinite; }    @keyframes orbFloat { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }    /* Floating shapes */    .shape { position: absolute; pointer-events: none; opacity: 0.06; }    .shape1 { top: 18%; right: 15%; width: 90px; height: 90px; border: 1.5px solid var(--accent); border-radius: 50%; animation: spin 18s linear infinite; }    .shape2 { bottom: 25%; right: 25%; width: 50px; height: 50px; border: 1.5px solid var(--accent); transform: rotate(45deg); animation: spin 12s linear infinite reverse; }    .shape3 { top: 65%; left: 12%; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: blink 3s ease infinite; }    .shape4 { top: 30%; left: 45%; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: blink 2s ease infinite 1s; }    @keyframes spin { to { transform: rotate(360deg); } }    @keyframes blink { 0%,100% { opacity: 0.06; } 50% { opacity: 0.3; } }    .hero-content { position:relative; z-index:2; display:flex; flex-direction:column; justify-content:center; }    .hero-eyebrow { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 500; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 28px; position:relative; z-index:2; }    .hero-eyebrow::before { content: ''; width: 28px; height: 1px; background: var(--accent); opacity: 0.7; }    .status-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px; margin-left: 12px; }    .status-dot::before { content: ''; width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: pulse 2s ease infinite; }    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }    .hero-name { font-size: clamp(80px, 13vw, 160px); font-weight: 700; line-height: 0.88; letter-spacing: -0.03em; margin-bottom: 36px; overflow: hidden; padding-bottom: 0.18em; }    .hero-name .line1 { display: block; clip-path: inset(0 0 -20px 0); animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 0.1s both; }    .hero-name .line2 { display: block; color: var(--accent); clip-path: inset(0 0 -20px 0); animation: slideUp 0.8s cubic-bezier(.16,1,.3,1) 0.25s both; cursor: default; }    @keyframes slideUp { from { transform: translateY(110%); } to { transform: translateY(0); } }    /* GLITCH HOVER */    .hero-name .line2:hover { animation: glitch .35s steps(3) forwards; }    @keyframes glitch {      0%   { text-shadow: 2px 0 cyan,  -2px 0 #ff0064; transform: skewX(0); }      25%  { text-shadow: -3px 0 #b8ff57, 3px 0 #ff0064; transform: skewX(-3deg); }      50%  { text-shadow: 3px 0 cyan, -3px 0 #b8ff57; transform: skewX(2deg); }      75%  { text-shadow: -2px 0 #ff0064, 2px 0 cyan; transform: skewX(-1deg); }      100% { text-shadow: none; transform: skewX(0); }    }    .section-eyebrow:hover { animation: glitch .35s steps(3) forwards; }    .hero-desc { font-size: clamp(15px, 1.6vw, 19px); color: var(--muted); max-width: 500px; line-height: 1.75; margin-bottom: 48px; font-weight: 300; }    .hero-desc strong { color: var(--text); font-weight: 500; }    .hero-rule { width: 48px; height: 2px; background: var(--accent); margin-bottom: 32px; box-shadow: 0 0 12px rgba(56,189,248,0.5); border-radius: 2px; }    .word-reveal { display: inline-block; overflow: hidden; vertical-align: bottom; }    .word-reveal span { display: inline-block; animation: wordUp 0.6s cubic-bezier(.16,1,.3,1) both; }    .hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }    .btn-accent { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: #080808; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 14px; padding: 14px 30px; border-radius: 8px; text-decoration: none; transition: box-shadow .2s, transform .2s; position: relative; letter-spacing: 0.01em; }    .btn-accent:hover { box-shadow: 0 0 40px rgba(56,189,248,0.4), 0 4px 20px rgba(56,189,248,0.2); transform: translateY(-1px); }    .btn-outline { display: inline-flex; align-items: center; gap: 8px; border: 1px solid var(--border2); color: var(--muted); font-size: 14px; font-weight: 400; padding: 14px 24px; border-radius: 8px; text-decoration: none; transition: color .2s, border-color .2s, background .2s; }    .btn-outline:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.03); }    .scroll-hint { position: absolute; bottom: 40px; left: 48px; display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; animation: fadeIn 1s ease 1.2s both; }    .scroll-line { width: 44px; height: 1px; background: var(--muted); animation: sline 2.5s ease infinite; }    @keyframes sline { 0%,100% { transform: scaleX(1); opacity: 0.4; } 50% { transform: scaleX(0.5); opacity: 1; } }    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }    /* HERO AURORA */    .hero-aurora { position:absolute; inset:0; pointer-events:none;      background: radial-gradient(ellipse 80% 60% at 78% 38%, rgba(56,189,248,0.055) 0%, transparent 55%),        radial-gradient(ellipse 55% 45% at 90% 8%, rgba(99,102,241,0.05) 0%, transparent 50%),        radial-gradient(ellipse 45% 55% at 65% 85%, rgba(56,189,248,0.03) 0%, transparent 50%);      animation: auroraShift 14s ease infinite alternate; }    @keyframes auroraShift { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.5} }    /* HERO GRID LINES */    .hero-gridlines { position:absolute; inset:0; pointer-events:none;      background-image: linear-gradient(rgba(56,189,248,0.025) 1px, transparent 1px),        linear-gradient(90deg, rgba(56,189,248,0.025) 1px, transparent 1px);      background-size: 72px 72px;      mask-image: radial-gradient(ellipse 50% 80% at 80% 50%, rgba(0,0,0,0.5) 0%, transparent 65%); }    /* HERO VISUAL - floating stat cards */    .hero-visual { position:absolute; right:24px; top:50%; transform:translateY(-50%); width:380px; height:520px; overflow:visible; }        .hv-card { position:absolute; background:rgba(12,12,12,0.92); border:1px solid var(--border2); border-radius:14px; padding:14px 20px; backdrop-filter:blur(16px); box-shadow:0 12px 40px rgba(0,0,0,0.55); pointer-events:all; transition:transform 0.3s ease, border-color 0.3s ease; }    .hv-card:hover { border-color:rgba(56,189,248,0.35); }    .hv-label { font-size:9px; font-weight:500; color:var(--muted); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:5px; }    .hv-val { font-family:'Space Grotesk',sans-serif; font-size:26px; font-weight:700; color:var(--text); line-height:1; }    .hv-val.a { color:var(--accent); }    .hv-sub { font-size:11px; color:var(--muted); margin-top:3px; }    .hv-c1 { top:0; left:0; width:196px; animation:hvFloat 5s ease-in-out infinite; }    .hv-c2 { top:105px; right:0; width:188px; animation:hvFloat 6.5s ease-in-out 0.8s infinite; border-color:rgba(56,189,248,0.2); background:rgba(56,189,248,0.04); }    .hv-c2 .hv-val { color:var(--accent); }    .hv-c3 { top:215px; left:20px; width:152px; animation:hvFloat 7s ease-in-out 1.4s infinite; }    .hv-c4 { top:288px; right:10px; width:165px; animation:hvFloat 5.8s ease-in-out 2s infinite; }    .hv-ring { position:absolute; border-radius:50%; border:1px solid rgba(56,189,248,0.09); pointer-events:none; animation:hvRingPulse 4s ease infinite; }    .hv-r1 { width:110px; height:110px; top:-18px; right:-18px; }    .hv-r2 { width:66px; height:66px; bottom:14px; left:-4px; animation-delay:1.8s; }    .hv-dotgrid { position:absolute; inset:0; pointer-events:none;      background-image:radial-gradient(rgba(56,189,248,0.14) 1px, transparent 1px);      background-size:22px 22px;      mask-image:radial-gradient(ellipse at 55% 50%, rgba(0,0,0,0.35) 0%, transparent 68%); }    @keyframes hvFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }    @keyframes hvRingPulse { 0%,100%{opacity:.25;transform:scale(1)} 50%{opacity:.75;transform:scale(1.09)} }    /* DOCK SIGN */    .dock-sign-wrap { display:inline-block; position:relative; padding:18px 36px 15px; margin-bottom:30px; background: linear-gradient(170deg, #4e2c10 0%, #3a1f08 30%, #5c3618 50%, #3a1f08 70%, #4e2c10 100%), repeating-linear-gradient(5deg, transparent, transparent 18px, rgba(0,0,0,0.1) 18px, rgba(0,0,0,0.1) 19px); background-blend-mode: normal; border:2.5px solid #7a5234; border-radius:5px; box-shadow:0 8px 32px rgba(0,0,0,0.7), 4px 4px 0 rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.07); }    .dock-sign-wrap::before, .dock-sign-wrap::after { content:''; position:absolute; width:11px; height:11px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #a07040, #3a200a); border:1.5px solid #2a1206; top:10px; }    .dock-sign-wrap::before { left:12px; }    .dock-sign-wrap::after { right:12px; }    .dock-sign-rope { position:absolute; top:-18px; left:18px; right:18px; height:18px; pointer-events:none; }    .dock-sign-rope::before, .dock-sign-rope::after { content:''; position:absolute; top:0; width:2px; height:18px; background:linear-gradient(180deg,#8b6040,#5c3820); }    .do
