function createFlow(container, text, opts) {
  opts = opts || {};
  var fontSize = opts.fontSize || 18;
  var lineHeight = opts.lineHeight || 24;
  var color = opts.color || '#111';
  var padding = (opts.padding != null) ? opts.padding : 16;
  var getObstacles = opts.getObstacles || function () { return []; };
  var fontFamily = '"Times New Roman", Times, serif';

  var cw = container.clientWidth;
  var ch = container.clientHeight;

  // ---- Measure each word ONCE with canvas measureText ----
  var canvas = document.createElement('canvas');
  var ctx = canvas.getContext('2d');
  ctx.font = fontSize + 'px ' + fontFamily;
  var spaceW = ctx.measureText(' ').width;

  var rawWords = text.split(/\s+/).filter(function (w) { return w.length > 0; });
  // Precompute immutable word records: text + measured width.
  var words = new Array(rawWords.length);
  for (var i = 0; i < rawWords.length; i++) {
    words[i] = { text: rawWords[i], w: ctx.measureText(rawWords[i]).width };
  }

  // ---- Reusable span pool ----
  // Spans are created lazily and kept; relayout reuses them by index and
  // hides any surplus rather than destroying nodes.
  var pool = [];
  function acquire(idx) {
    var s = pool[idx];
    if (!s) {
      s = document.createElement('span');
      s.style.position = 'absolute';
      s.style.top = '0';
      s.style.left = '0';
      s.style.font = fontSize + 'px ' + fontFamily;
        s.style.whiteSpace = 'pre';
      s.style.willChange = 'transform';
      container.appendChild(s);
      pool[idx] = s;
    }
    return s;
  }

  // ---- Free-interval computation for a horizontal band ----
  // Returns array of [x0,x1] free intervals within [0,cw], obstacles expanded
  // by padding. Reuses a scratch array to avoid per-call allocation churn.
  var blockedScratch = [];
  function freeIntervals(bandTop, bandBot, obstacles) {
    blockedScratch.length = 0;
    for (var k = 0; k < obstacles.length; k++) {
      var o = obstacles[k];
      var bx0, bx1;
      if (o.type === 'rect') {
        var oy0 = o.y - padding, oy1 = o.y + o.h + padding;
        if (bandBot <= oy0 || bandTop >= oy1) continue; // band doesn't cross
        bx0 = o.x - padding;
        bx1 = o.x + o.w + padding;
      } else { // circle
        var R = o.r + padding;
        // Use the y within the band closest to the circle center, so the
        // blocked interval is the WIDEST chord the band's full height sees
        // (a word box spans the whole band, not just its mid-y).
        var nearY = o.cy;
        if (nearY < bandTop) nearY = bandTop;
        else if (nearY > bandBot) nearY = bandBot;
        var dy = nearY - o.cy;
        if (dy < 0) dy = -dy;
        if (dy >= R) continue; // band doesn't reach the expanded circle
        var half = Math.sqrt(R * R - dy * dy);
        bx0 = o.cx - half;
        bx1 = o.cx + half;
      }
      if (bx1 <= 0 || bx0 >= cw) continue;
      if (bx0 < 0) bx0 = 0;
      if (bx1 > cw) bx1 = cw;
      blockedScratch.push([bx0, bx1]);
    }
    if (blockedScratch.length === 0) return [[0, cw]];
    blockedScratch.sort(function (a, b) { return a[0] - b[0]; });
    // merge overlapping blocked intervals
    var merged = [];
    var cur = blockedScratch[0].slice();
    for (var m = 1; m < blockedScratch.length; m++) {
      var iv = blockedScratch[m];
      if (iv[0] <= cur[1]) { if (iv[1] > cur[1]) cur[1] = iv[1]; }
      else { merged.push(cur); cur = iv.slice(); }
    }
    merged.push(cur);
    // complement -> free intervals
    var free = [];
    var x = 0;
    for (var f = 0; f < merged.length; f++) {
      if (merged[f][0] > x) free.push([x, merged[f][0]]);
      x = merged[f][1];
    }
    if (x < cw) free.push([x, cw]);
    return free;
  }

  function relayout() {
    var obstacles = getObstacles() || [];
    var spanIdx = 0;        // index into pool / placed-word cursor
    var wi = 0;             // next word to place

    for (var y = 0; y + lineHeight <= ch && wi < words.length; y += lineHeight) {
      var bandTop = y;
      var bandBot = y + lineHeight;
      var free = freeIntervals(bandTop, bandBot, obstacles);

      var baselineTop = y + (lineHeight - fontSize) / 2; // vertical centering in band

      // Fill each free interval left-to-right with the pending words.
      for (var s = 0; s < free.length && wi < words.length; s++) {
        var segX1 = free[s][1];
        var penX = free[s][0];
        var first = true;
        while (wi < words.length) {
          var word = words[wi];
          var need = (first ? 0 : spaceW) + word.w;

          span.textContent = word.text;
          span.style.display = 'block';
          span.style.transform = 'translate(' + penX + 'px,' + baselineTop + 'px)';
          penX += word.w;
          wi++;
          first = false;
        }
      }
    }

    // Hide surplus spans from a previous (longer) layout.
    for (var h = spanIdx; h < pool.length; h++) {
      if (pool[h] && pool[h].style.display !== 'none') pool[h].style.display = 'none';
    }
  }

  relayout();
  return { relayout: relayout };
}
 const STRIPS={"diver": [[0.3443, 0.368, 0.0, 0.0455], [0.3005, 0.3644, 0.0455, 0.0909], [0.2868, 0.3178, 0.0909, 0.1364], null, [0.2685, 0.3132, 0.1818, 0.2273], [0.1534, 0.3114, 0.2273, 0.2727], [0.1014, 0.2639, 0.2727, 0.3182], [0.0849, 0.3352, 0.3182, 0.3636], [0.0822, 0.4502, 0.3636, 0.4091], [0.0858, 0.5151, 0.4091, 0.4545], [0.0858, 0.579, 0.4545, 0.5], [0.0932, 0.5936, 0.5, 0.5455], [0.1068, 0.8712, 0.5455, 0.5909], [0.1096, 0.9306, 0.5909, 0.6364], [0.0995, 0.9881, 0.6364, 0.6818], [0.0137, 0.9881, 0.6818, 0.7273], [0.011, 0.9726, 0.7273, 0.7727], [0.4977, 0.9543, 0.7727, 0.8182], [0.5671, 0.9406, 0.8182, 0.8636], [0.642, 0.9626, 0.8636, 0.9091], [0.8566, 0.9571, 0.9091, 0.9545], [0.8822, 0.9279, 0.9545, 1.0]]}, PAGES=[{"head": {"big": "why this book", "sub": ""}, "text": "i made this less as a portfolio and more as a small book, because a list of links never really said what i actually do. what i do is build things, break them on purpose, and rebuild them until they hold. the chapters run backward in time, from what i'm building right now to the sixth-grader who thought code was a kind of magic. drag the pictures around if you want, the words will move out of their way. that part is real, not decoration: it's the same little engine i like building into everything else.", "pic": {"src": "media/photos/IMG_6629.JPG", "photo": true, "rot": -3}}, {"head": {"big": "2026", "sub": "the surface"}, "text": "right now almost everything i have goes into presonance, a small comp-neuro lab where i'm the co-founder and ceo. we predict how people actually respond to content before a dollar is spent promoting it: not what a survey says, not what a model guesses, but how a real nervous system reacts. we're advised by ad teams at meta, neuroscience folks at georgia tech, and a couple of nine-figure founders. this fall i start cs at carnegie mellon with a 4.0, and i just wrapped nine months as an ml researcher at the institute for systems biology, modeling preeclampsia to catch it earlier than we can today. i also won most innovative at harvard's hsil for medsim.", "pic": {"src": "media/screens/presonance-desktop.png", "photo": true, "rot": 3}}, {"head": {"big": "2025", "sub": "the build years"}, "text": "these were the years i learned to actually ship. i was a funded trader at topstep, running indicators i coded myself, until i admitted you can't half-build a company and quit to go all in on presonance. i ran expansion at ai valley alongside teams from openai, anthropic, and afore. i built sentinent, a swarm-intelligence trading engine that turns live sentiment into positions i can explain instead of just trust. and i took coursework at stanford in data science and statistics to keep the math honest. none of it was tidy, and i think that's exactly when i work best: too many things at once, each one teaching me something the others turned out to need.", "pic": {"src": "media/photos/03232026_AIValley_CMU-55.jpg", "photo": true, "rot": -2}}, {"head": {"big": "2024", "sub": "going deeper"}, "text": "at sixteen i founded oncoscan.ai. i built and patented an oral cancer detection model, found national partnerships willing to take a teenager seriously, and got onto aws activate. it was the first time something i made had to survive the real world, with regulators and clinicians and people whose health was on the other side of the screen. around the same time i started the uplift network, wrote a cs program, and got it in front of more than three thousand students across over fifty schools, helping cover college tuition for some of the ones who finished. that one still means the most to me.", "pic": {"src": "media/photos/mixer.png", "photo": true, "rot": 2}}, {"head": {"big": "2023", "sub": "the first win"}, "text": "this is the year it stopped being a hobby. my first real research win was a 3d convolutional network that classified brain strokes from medical scans, and it took first place at the washington state science and engineering fair. it sounds small written down, but standing there having built something that could actually read a scan, with judges asking real questions, was the first time i believed this could be a life and not just a thing i did after school. almost everything in the other chapters is really just me chasing that feeling again with bigger problems.", "pic": {"src": "media/photos/IMG_3423.jpg", "photo": true, "rot": -2}}, {"head": {"big": "2020", "sub": "where it started"}, "text": "the real beginning is quieter than all of it. i started coding in sixth grade, mostly because it felt like magic that you could write something down and then watch it learn. i built my first neural network at thirteen, not because anyone asked, but because i couldn't let go of how a machine could figure anything out on its own. i still haven't. the through-line never changed: i like hard problems that touch real people, i like building the thing instead of talking about it, and i'm completely fine being wrong on the way to being right.", "pic": {"src": "media/diver.png", "photo": false, "strips": "diver", "rot": 0}}, {"head": {"big": "acknowledgements", "sub": ""}, "text": "thank you to the people who took a teenager seriously before there was a reason to: the advisors at meta and georgia tech, and the founders who somehow always picked up the phone. to the researchers and clinicians who let me work on things that genuinely mattered. to the students and schools who trusted the uplift program with their time. and to my family, who watched me start far too many things at once and never once told me to stop.", "pic": null}, {"head": {"big": "a summary", "sub": ""}, "text": "here is the whole book in one breath. i build things, i break them on purpose, and i retrain them until they hold. that is presonance today, it was oncoscan, it was a brain-stroke model at a science fair, and it will be whatever comes next. when i'm not at a screen you'll usually find me scuba diving or skydiving, which, honestly, is the same exact loop as everything else in here, just with more water and more air. thanks for turning the pages.", "pic": {"src": "media/photos/drawing.jpg", "photo": true, "rot": 2}}];

 function go(d){ if(d<0&&spread<=0){closeBook();return;} if((d>0&&spread<SPREADS-1)||(d<0&&spread>0)){turn(d,()=>{spread+=d;buildSpread();});}}
 document.getElementById('next').onclick=()=>go(1); document.getElementById('prev').onclick=()=>go(-1);
 addEventListener('keydown',e=>{if(e.key==='ArrowRight')go(1);if(e.key==='ArrowLeft')go(-1);});
 addEventListener('resize',()=>buildSpread());
 function closeBook(){document.body.classList.remove('opened');pics.forEach(p=>{p.style.display='none';p.dataset.on='';});spread=0;}
 function openBook(){if(document.body.classList.contains('opened'))return;document.body.classList.add('opened');buildSpread();}
 document.getElementById('coverBook').addEventListener('click',openBook);
 function init(){buildSpread();} if(document.readyState==='complete')init();else addEventListener('load',init);
</script></body></html>
